# .github/workflows/live_data.yml
# ─────────────────────────────────────────────────────────────────────────────
# Runs every 15 minutes on weekdays during NSE market hours (9:00 AM - 4:00 PM IST)
# IST = UTC+5:30, so 9:00 AM IST = 3:30 AM UTC, 4:00 PM IST = 10:30 AM UTC
# ─────────────────────────────────────────────────────────────────────────────

name: Live Data Refresh

on:
  schedule:
    # Every 15 minutes, Mon–Fri, 3:15 AM – 10:45 AM UTC (9:00 AM – 4:15 PM IST)
    - cron: '0,15,30,45 3-10 * * 1-5'
  workflow_dispatch:   # Manual trigger from GitHub Actions tab

permissions:
  contents: write      # Needed to commit JSON files back to repo

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # 1. Check out the repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. Install dependencies
      - name: Install Python packages
        run: pip install -r requirements.txt --break-system-packages

      # 4. Create output folders
      - name: Create data directory
        run: mkdir -p data output bse_data

      # 5. Run the data fetcher
      - name: Fetch live data
        run: python scripts/fetch_data.py

      # 6. Commit updated JSON files back to the repo
      # This is how the dashboard gets live data —
      # index.html fetches /data/*.json from GitHub Pages
      - name: Commit updated data files
        run: |
          git config user.name  "EquityDesk Bot"
          git config user.email "equitydesk-bot@users.noreply.github.com"
          git add data/
          # Only commit if there are actual changes
          git diff --staged --quiet || git commit -m "📊 Data refresh: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
